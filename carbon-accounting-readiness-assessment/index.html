  <!-- Assessment Container -->

  <script src="/assets/js/assessment/index.js?v=5"></script>

  <script>
    // Initialise assessment when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('assessment-root');
      if (!container) {
        console.error('Assessment container not found');
        return;
      }

      const engine = initAssessment('assessment-root', {
        assessmentSlug: 'carbon-accounting-readiness'
      });

      if (engine) {
        engine.load('carbon-accounting-readiness')
          .then(() => {
            wireAssessmentCallbacks(engine);
            engine.analytics.trackView();
            engine.start();
          })
          .catch(error => {
            console.error('Failed to load assessment:', error);
            container.innerHTML = `
              <div class="max-w-lg mx-auto py-12 px-6 text-center">
                <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <h2 class="text-xl font-bold text-white mb-2">Unable to Load Assessment</h2>
                <p class="text-slate-400 mb-6">Please refresh the page or try again later.</p>
                <button onclick="location.reload()" class="px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 text-white font-medium transition-colors">Refresh Page</button>
              </div>
            `;
          });
      }
    });
  </script>
