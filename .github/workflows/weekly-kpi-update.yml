name: Weekly KPI Dashboard Update

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8 AM UTC
  workflow_dispatch:
    inputs:
      week_ending:
        description: 'Week ending date (YYYY-MM-DD, optional)'
        required: false

jobs:
  kpi-update:
    # ENABLED: GSC API diagnostic verified 2026-07-14
    # Property: sc-domain:terrnix.com | Permission: siteOwner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secrets configured
        run: |
          if [ -z "${{ secrets.GA_PROPERTY_ID }}" ]; then
            echo "❌ GA_PROPERTY_ID not set"
            exit 1
          fi
          if [ -z "${{ secrets.GA_CREDENTIALS }}" ]; then
            echo "❌ GA_CREDENTIALS not set"
            exit 1
          fi
          echo "✅ GA secrets configured"

      - name: Install dependencies
        run: npm install --no-save @google-analytics/data googleapis

      - name: Fetch GA Data
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_CREDENTIALS: ${{ secrets.GA_CREDENTIALS }}
        run: node scripts/fetch-ga-data.js

      - name: Fetch GSC Data
        env:
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS || secrets.GA_CREDENTIALS }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: node scripts/fetch-gsc-data.js
        continue-on-error: true

      - name: Check for data files
        run: |
          if [ ! -f .ga-data.json ] && [ ! -f .gsc-data.json ]; then
            echo "❌ No data files created"
            exit 1
          fi
          echo "✅ Data files exist"

      - name: Update Dashboard
        run: node scripts/update-dashboard.js

      - name: Commit Updated Dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TERRNIX_KPI_DASHBOARD.md
          git diff --cached --quiet || git commit -m "📊 Weekly KPI Update - $(date +%Y-%m-%d)"
          git push

      - name: Create Summary Issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const weekEnding = '${{ github.event.inputs.week_ending }}' || new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly KPI Update - Week Ending ${weekEnding}`,
              body: `## Weekly KPI Dashboard Updated\n\n- Dashboard: [TERRNIX_KPI_DASHBOARD.md](../blob/main/TERRNIX_KPI_DASHBOARD.md)\n- Content Performance: [CONTENT_PERFORMANCE.md](../blob/main/CONTENT_PERFORMANCE.md)\n\n### Action Items\n- [ ] Review traffic trends\n- [ ] Check conversion rates\n- [ ] Identify content opportunities\n- [ ] Plan next week priorities`,
              labels: ['kpi', 'weekly', 'dashboard']
            });
